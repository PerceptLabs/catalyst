name = "nuxt-fullstack"
main = ".output/server/index.mjs"

[vars]
APP_NAME = "Nuxt Todo App"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "session-kv-001"

[[d1_databases]]
binding = "MY_DB"
database_name = "todos-db"
database_id = "todos-db-001"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "uploads-bucket"
